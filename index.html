<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reforma - Product Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f5f0e8; --dark: #1a1612; --accent: #b8860b;
      --accent-light: #d4a843; --muted: #7a7060; --border: #e0d8c8;
      --white: #ffffff; --card-bg: #fdfaf4;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

    #loader { position: fixed; inset: 0; background: var(--cream); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-text { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--accent); letter-spacing: 0.2em; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    nav { position: sticky; top: 0; z-index: 100; background: rgba(245,240,232,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; gap: 1rem; }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--dark); text-decoration: none; letter-spacing: 0.05em; flex-shrink: 0; }
    .nav-logo span { color: var(--accent); }

    .lang-wrapper { position: relative; flex-shrink: 0; }
    .lang-selected { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); padding: 5px 14px; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; color: var(--dark); transition: all 0.2s; white-space: nowrap; }
    .lang-selected:hover { border-color: var(--accent); color: var(--accent); }
    .lang-selected .arrow { font-size: 0.6rem; transition: transform 0.2s; margin-left: 2px; }
    .lang-wrapper.open .lang-selected { border-color: var(--accent); color: var(--accent); }
    .lang-wrapper.open .arrow { transform: rotate(180deg); }
    .lang-dropdown { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--white); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 32px rgba(26,22,18,0.12); min-width: 180px; max-height: 320px; overflow-y: auto; z-index: 200; }
    .lang-wrapper.open .lang-dropdown { display: block; }
    .lang-dropdown::-webkit-scrollbar { width: 4px; }
    .lang-dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .lang-option { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; font-size: 0.82rem; color: var(--dark); transition: background 0.15s; }
    .lang-option:hover { background: var(--cream); }
    .lang-option.active { color: var(--accent); font-weight: 500; }
    .lang-option .flag { font-size: 1.1rem; }
    .lang-option .code { font-size: 0.7rem; color: var(--muted); margin-left: auto; }

    .hero { position: relative; overflow: hidden; min-height: 520px; display: flex; align-items: flex-end; }
    .hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,22,18,0.85) 0%, rgba(26,22,18,0.2) 60%, transparent 100%); }
    .hero-content { position: relative; z-index: 2; padding: 3rem 3rem 3.5rem; max-width: 700px; animation: fadeUp 0.8s ease both; }
    .hero-tag { display: inline-block; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-light); border: 1px solid var(--accent-light); padding: 4px 14px; border-radius: 20px; margin-bottom: 1rem; }
    .hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 600; line-height: 1.1; color: var(--white); margin-bottom: 1rem; }
    .hero-desc { font-size: 1rem; line-height: 1.7; color: rgba(255,255,255,0.75); max-width: 500px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }

    .cat-nav { padding: 1.5rem 2rem; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--white); }
    .cat-nav-btn { background: none; border: 1px solid var(--border); padding: 6px 18px; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; color: var(--muted); transition: all 0.2s; }
    .cat-nav-btn:hover, .cat-nav-btn.active { background: var(--dark); border-color: var(--dark); color: var(--white); }

    .section { padding: 4rem 2rem; border-bottom: 1px solid var(--border); }
    .section:last-child { border-bottom: none; }
    .section-header { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; margin-bottom: 3rem; }
    .section-header.reverse { direction: rtl; }
    .section-header.reverse > * { direction: ltr; }
    .section-img-wrap { position: relative; border-radius: 4px; overflow: hidden; aspect-ratio: 4/3; }
    .section-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
    .section-img-wrap:hover .section-img { transform: scale(1.03); }
    .section-number { font-family: 'Cormorant Garamond', serif; font-size: 5rem; font-weight: 700; color: var(--border); line-height: 1; margin-bottom: -1rem; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 600; color: var(--dark); margin-bottom: 1rem; line-height: 1.2; }
    .section-desc { font-size: 0.95rem; line-height: 1.8; color: var(--muted); }
    .section-count { display: inline-block; margin-top: 1.5rem; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); border-bottom: 1px solid var(--accent); padding-bottom: 2px; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
    .product-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: box-shadow 0.3s, transform 0.3s; }
    .product-card:hover { box-shadow: 0 8px 32px rgba(26,22,18,0.1); transform: translateY(-4px); }
    .product-img-wrap { aspect-ratio: 1/1; overflow: hidden; background: var(--border); }
    .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
    .product-card:hover .product-img { transform: scale(1.06); }
    .product-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: linear-gradient(135deg, #ede8df, #d8d0c0); }
    .product-info { padding: 1rem; text-align: center; }
    .product-name { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--dark); margin-bottom: 0.3rem; line-height: 1.3; }
    .product-sku { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; letter-spacing: 0.05em; }
    .product-desc { font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; line-height: 1.5; }

    footer { background: var(--dark); color: rgba(255,255,255,0.4); text-align: center; padding: 2rem; font-size: 0.8rem; letter-spacing: 0.05em; }
    footer strong { color: rgba(255,255,255,0.7); }

    @media (max-width: 768px) {
      .section-header, .section-header.reverse { grid-template-columns: 1fr; direction: ltr; }
      .hero-content { padding: 2rem 1.5rem 2.5rem; }
      nav { padding: 0 1rem; }
      .section { padding: 3rem 1rem; }
      .cat-nav { padding: 1rem; }
    }
  </style>
</head>
<body>

<div id="loader"><span class="loader-text">Loading...</span></div>

<nav>
  <a class="nav-logo" href="#"><span id="nav-title">Reforma</span></a>
  <div class="lang-wrapper" id="lang-wrapper">
    <button class="lang-selected" onclick="toggleLangDropdown()">
      <span id="lang-flag">🇬🇧</span>
      <span id="lang-label">English</span>
      <span class="arrow">▼</span>
    </button>
    <div class="lang-dropdown" id="lang-dropdown"></div>
  </div>
</nav>

<main id="main"></main>

<footer>
  <strong id="footer-brand">Reforma</strong> &mdash; <span>© 2026 - All rights reserved</span>
</footer>

<script>
// ════════════════════════════════════════════════════════════════
//  КОНФИГУРАЦИЯ
// ════════════════════════════════════════════════════════════════
const CONFIG = {
  SHEET_ID: "1YK1wFH7qPgbCOTT76lEQLrxIpni6-3GnwT7AFalfJTQ",
  SHEETS: { settings: "Settings" },
  DEFAULT_LANG: "en",
  LANGUAGES: {
    en: { label: "English",    flag: "🇬🇧", sheet: "Lang_EN" },
    pl: { label: "Polish",     flag: "🇵🇱", sheet: "Lang_PL" },
    uk: { label: "Ukrainian",  flag: "🇺🇦", sheet: "Lang_UK" },
    fr: { label: "French",     flag: "🇫🇷", sheet: "Lang_FR" },
    nl: { label: "Dutch",      flag: "🇳🇱", sheet: "Lang_NL" },
    de: { label: "German",     flag: "🇩🇪", sheet: "Lang_DE" },
    it: { label: "Italian",    flag: "🇮🇹", sheet: "Lang_IT" },
    es: { label: "Spanish",    flag: "🇪🇸", sheet: "Lang_ES" },
    pt: { label: "Portuguese", flag: "🇵🇹", sheet: "Lang_PT" },
    el: { label: "Greek",      flag: "🇬🇷", sheet: "Lang_EL" },
    cs: { label: "Czech",      flag: "🇨🇿", sheet: "Lang_CS" },
    sk: { label: "Slovak",     flag: "🇸🇰", sheet: "Lang_SK" },
    hu: { label: "Hungarian",  flag: "🇭🇺", sheet: "Lang_HU" },
    ro: { label: "Romanian",   flag: "🇷🇴", sheet: "Lang_RO" },
    bg: { label: "Bulgarian",  flag: "🇧🇬", sheet: "Lang_BG" },
    hr: { label: "Croatian",   flag: "🇭🇷", sheet: "Lang_HR" },
    sr: { label: "Serbian",    flag: "🇷🇸", sheet: "Lang_SR" },
    sl: { label: "Slovenian",  flag: "🇸🇮", sheet: "Lang_SL" },
    da: { label: "Danish",     flag: "🇩🇰", sheet: "Lang_DA" },
    no: { label: "Norwegian",  flag: "🇳🇴", sheet: "Lang_NO" },
    sv: { label: "Swedish",    flag: "🇸🇪", sheet: "Lang_SV" },
    fi: { label: "Finnish",    flag: "🇫🇮", sheet: "Lang_FI" },
    ru: { label: "Russian",    flag: "🇷🇺", sheet: "Lang_RU" },
  },
};
// ════════════════════════════════════════════════════════════════

// ─── СТРУКТУРА ЛИСТА Lang_XX ──────────────────────────────────────
// Колонки: category_id | category_name | category_desc | category_image | name | desc | price | image
//
// cat1 | Cover Base | Description... | https://img.jpg | Cover base Light Pink | 10 ml | 942253 | https://img.jpg
// cat1 |            |                |                 | Cover base Coconut    | 10 ml | 942251 | https://img.jpg
// cat2 | Gel Polish | Description... | https://img.jpg | Red №1               | 8 ml  | 943100 | https://img.jpg

let currentLang       = CONFIG.DEFAULT_LANG;
let langCache         = {};
let settingsData      = {};
let currentCategories = [];

const apiUrl = (sheet) =>
  `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;

// ─── FETCH — правильно обрабатывает числа ────────────────────────
async function fetchSheet(sheetName) {
  const res  = await fetch(apiUrl(sheetName));
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));

  const LANG_HEADERS = ["category_id","category_name","category_desc","category_image","name","desc","price","image"];

  const allRows = json.table.rows.map(row =>
    row.c.map(cell => {
      if (!cell || cell.v === null || cell.v === undefined) return "";
      if (cell.f) return cell.f;
      return String(cell.v);
    })
  );

  if (!allRows.length) return [];

  // Для Settings — первая строка это заголовки
  if (sheetName === CONFIG.SHEETS.settings) {
    const headers = allRows[0];
    return allRows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { if (h) obj[h.trim()] = row[i] || ""; });
      return obj;
    });
  }

  // Для языковых листов — используем фиксированные заголовки, пропускаем строку-заголовок если она есть
  const firstRow = allRows[0];
  const startIdx = firstRow[0] === "category_id" ? 1 : 0;
  return allRows.slice(startIdx).map(row => {
    const obj = {};
    LANG_HEADERS.forEach((h, i) => { obj[h] = row[i] || ""; });
    return obj;
  });
}

// ─── PARSE SETTINGS ───────────────────────────────────────────────
function parseSettings(rows) {
  const s = {};
  rows.forEach(row => { if (row.key) s[row.key] = row; });
  return s;
}

// ─── PARSE LANG SHEET ─────────────────────────────────────────────
function parseLangSheet(rows) {
  const catMap = new Map();
  rows.forEach(row => {
    const cid = row["category_id"];
    if (!cid || cid === "category_id") return;

    if (!catMap.has(cid)) {
      catMap.set(cid, {
        id:       cid,
        name:     row["category_name"]  || "",
        desc:     row["category_desc"]  || "",
        image:    row["category_image"] || "",
        products: [],
      });
    }

    if (row["name"]) {
      catMap.get(cid).products.push({
        name:  row["name"]  || "",
        desc:  row["desc"]  || "",
        sku:   row["price"] || "",
        image: row["image"] || "",
      });
    }
  });
  return [...catMap.values()];
}

// ─── LOAD LANG (с кэшем) ─────────────────────────────────────────
async function loadLang(lang) {
  if (langCache[lang]) return langCache[lang];
  const sheetName = CONFIG.LANGUAGES[lang]?.sheet;
  if (!sheetName) return [];
  try {
    const rows = await fetchSheet(sheetName);
    langCache[lang] = parseLangSheet(rows);
  } catch (e) {
    console.warn(`Не удалось загрузить ${sheetName}:`, e);
    langCache[lang] = [];
  }
  return langCache[lang];
}

const setting = (key) => {
  if (!settingsData[key]) return "";
  return settingsData[key][currentLang] || settingsData[key]["en"] || "";
};

// ─── RENDER ───────────────────────────────────────────────────────
function render() {
  const siteName = setting("site_name") || "Reforma";
  document.title = siteName;
  document.getElementById("nav-title").textContent   = siteName;
  document.getElementById("footer-brand").textContent = siteName;

  const info = CONFIG.LANGUAGES[currentLang];
  document.getElementById("lang-flag").textContent  = info.flag;
  document.getElementById("lang-label").textContent = info.label;

  document.getElementById("lang-dropdown").innerHTML =
    Object.entries(CONFIG.LANGUAGES).map(([code, inf]) =>
      `<div class="lang-option${code === currentLang ? " active" : ""}" onclick="switchLang('${code}')">
        <span class="flag">${inf.flag}</span>
        <span>${inf.label}</span>
        <span class="code">${code.toUpperCase()}</span>
      </div>`
    ).join("");

  const bannerImg   = setting("banner_1_image");
  const bannerTag   = setting("banner_1_tag");
  const bannerTitle = setting("banner_1_title");
  const bannerDesc  = setting("banner_1_desc");

  const catNavHtml = currentCategories.map(cat =>
    `<button class="cat-nav-btn" onclick="document.getElementById('cat-${cat.id}').scrollIntoView({behavior:'smooth'})">${cat.name}</button>`
  ).join("");

  const sectionsHtml = currentCategories.map((cat, idx) => {
    const isReverse = idx % 2 === 1;
    const productsHtml = cat.products.map(p => `
      <div class="product-card">
        <div class="product-img-wrap">
          ${p.image
            ? `<img class="product-img" src="${p.image}" alt="${p.name}" loading="lazy" />`
            : `<div class="product-img-placeholder">🛍️</div>`}
        </div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          ${p.desc ? `<div class="product-desc">${p.desc}</div>` : ""}
          ${p.sku  ? `<div class="product-sku">№ ${p.sku}</div>` : ""}
        </div>
      </div>`).join("");

    return `<section class="section" id="cat-${cat.id}">
      <div class="section-header${isReverse ? " reverse" : ""}">
        <div class="section-img-wrap">
          ${cat.image
            ? `<img class="section-img" src="${cat.image}" alt="${cat.name}" loading="lazy" />`
            : `<div class="product-img-placeholder">📦</div>`}
        </div>
        <div class="section-text">
          <div class="section-number">0${idx + 1}</div>
          <h2 class="section-title">${cat.name}</h2>
          ${cat.desc ? `<p class="section-desc">${cat.desc}</p>` : ""}
          <span class="section-count">${cat.products.length} ${productWord(cat.products.length)}</span>
        </div>
      </div>
      <div class="product-grid">${productsHtml}</div>
    </section>`;
  }).join("");

  document.getElementById("main").innerHTML = `
    <section class="hero">
      ${bannerImg ? `<img class="hero-img" src="${bannerImg}" alt="banner" />` : ""}
      <div class="hero-overlay"></div>
      <div class="hero-content">
        ${bannerTag   ? `<span class="hero-tag">${bannerTag}</span>`   : ""}
        <h1 class="hero-title">${bannerTitle}</h1>
        ${bannerDesc  ? `<p class="hero-desc">${bannerDesc}</p>`       : ""}
      </div>
    </section>
    <div class="cat-nav">${catNavHtml}</div>
    ${sectionsHtml}`;
}

// ─── PRODUCT WORD ─────────────────────────────────────────────────
function productWord(n) {
  const w = { en:["item","items"], pl:["produkt","produkty","produktów"], uk:["товар","товари","товарів"], fr:["article","articles"], nl:["artikel","artikelen"], de:["Artikel","Artikel"], it:["articolo","articoli"], es:["artículo","artículos"], pt:["artigo","artigos"], el:["είδος","είδη"], cs:["položka","položky","položek"], sk:["položka","položky","položiek"], hu:["termék","termék"], ro:["produs","produse"], bg:["артикул","артикула","артикула"], hr:["artikl","artikla","artikala"], sr:["artikal","artikla","artikala"], sl:["artikel","artikli"], da:["vare","varer"], no:["vare","varer"], sv:["artikel","artiklar"], fi:["tuote","tuotetta"], ru:["товар","товара","товаров"] };
  const arr = w[currentLang] || w.en;
  if (["ru","uk","bg"].includes(currentLang) && arr.length===3) { const m=n%10,m2=n%100; if(m2>=11&&m2<=14)return arr[2]; if(m===1)return arr[0]; if(m>=2&&m<=4)return arr[1]; return arr[2]; }
  if (["pl","cs","sk","hr","sr"].includes(currentLang) && arr.length===3) { if(n===1)return arr[0]; if(n>=2&&n<=4)return arr[1]; return arr[2]; }
  return n===1 ? arr[0] : (arr[1]||arr[0]);
}

// ─── SWITCH LANG ──────────────────────────────────────────────────
async function switchLang(lang) {
  document.getElementById("lang-wrapper").classList.remove("open");
  currentLang = lang;
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(245,240,232,0.75);z-index:9998;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)";
  overlay.innerHTML = `<span style="font-size:2.5rem;animation:pulse 0.8s infinite">${CONFIG.LANGUAGES[lang].flag}</span>`;
  document.body.appendChild(overlay);
  currentCategories = await loadLang(lang);
  render();
  document.body.removeChild(overlay);
}

function toggleLangDropdown() {
  document.getElementById("lang-wrapper").classList.toggle("open");
}
document.addEventListener("click", e => {
  const w = document.getElementById("lang-wrapper");
  if (w && !w.contains(e.target)) w.classList.remove("open");
});

// ─── INIT ─────────────────────────────────────────────────────────
async function init() {
  try {
    const [settingsRows, langCategories] = await Promise.all([
      fetchSheet(CONFIG.SHEETS.settings),
      loadLang(CONFIG.DEFAULT_LANG),
    ]);
    settingsData      = parseSettings(settingsRows);
    currentCategories = langCategories;

    // ВРЕМЕННО — удали после отладки
    console.log("Категорий загружено:", currentCategories.length);
    console.log("Категории:", JSON.stringify(currentCategories, null, 2));

  } catch(e) {
    console.error("Ошибка загрузки:", e);
  }
  render();
  const loader = document.getElementById("loader");
  loader.classList.add("hidden");
  setTimeout(() => loader.remove(), 600);
}

init();
</script>
</body>
</html>
