<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reforma - Product Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f5f0e8;
      --dark: #1a1612;
      --accent: #b8860b;
      --accent-light: #d4a843;
      --muted: #7a7060;
      --border: #e0d8c8;
      --white: #ffffff;
      --card-bg: #fdfaf4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ─── LOADER ─── */
    #loader {
      position: fixed; inset: 0; background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 300; color: var(--accent);
      letter-spacing: 0.2em;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* ─── NAVBAR ─── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,240,232,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
      gap: 1rem;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--dark); text-decoration: none;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .nav-logo span { color: var(--accent); }

    /* ─── LANGUAGE DROPDOWN ─── */
    .lang-wrapper {
      position: relative;
      flex-shrink: 0;
    }
    .lang-selected {
      display: flex; align-items: center; gap: 6px;
      background: none; border: 1px solid var(--border);
      padding: 5px 14px; border-radius: 20px;
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
      font-weight: 500; cursor: pointer; color: var(--dark);
      transition: all 0.2s; letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .lang-selected:hover { border-color: var(--accent); color: var(--accent); }
    .lang-selected .arrow {
      font-size: 0.6rem; transition: transform 0.2s;
      margin-left: 2px;
    }
    .lang-wrapper.open .lang-selected { border-color: var(--accent); color: var(--accent); }
    .lang-wrapper.open .arrow { transform: rotate(180deg); }

    .lang-dropdown {
      display: none;
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(26,22,18,0.12);
      min-width: 180px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 200;
    }
    .lang-wrapper.open .lang-dropdown { display: block; }

    .lang-dropdown::-webkit-scrollbar { width: 4px; }
    .lang-dropdown::-webkit-scrollbar-track { background: transparent; }
    .lang-dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .lang-option {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      font-size: 0.82rem; color: var(--dark);
      transition: background 0.15s;
    }
    .lang-option:hover { background: var(--cream); }
    .lang-option.active { color: var(--accent); font-weight: 500; }
    .lang-option .flag { font-size: 1.1rem; }
    .lang-option .code {
      font-size: 0.7rem; color: var(--muted);
      margin-left: auto;
    }

    /* ─── HERO ─── */
    .hero {
      position: relative; overflow: hidden;
      min-height: 520px;
      display: flex; align-items: flex-end;
    }
    .hero-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,22,18,0.85) 0%, rgba(26,22,18,0.2) 60%, transparent 100%);
    }
    .hero-content {
      position: relative; z-index: 2;
      padding: 3rem 3rem 3.5rem;
      max-width: 700px;
      animation: fadeUp 0.8s ease both;
    }
    .hero-tag {
      display: inline-block;
      font-size: 0.7rem; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent-light);
      border: 1px solid var(--accent-light);
      padding: 4px 14px; border-radius: 20px;
      margin-bottom: 1rem;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 600; line-height: 1.1;
      color: var(--white); margin-bottom: 1rem;
    }
    .hero-desc {
      font-size: 1rem; line-height: 1.7;
      color: rgba(255,255,255,0.75);
      max-width: 500px;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }

    /* ─── CATEGORY NAV ─── */
    .cat-nav {
      padding: 1.5rem 2rem;
      display: flex; gap: 10px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--white);
    }
    .cat-nav-btn {
      background: none; border: 1px solid var(--border);
      padding: 6px 18px; border-radius: 20px;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      cursor: pointer; color: var(--muted);
      transition: all 0.2s;
    }
    .cat-nav-btn:hover,
    .cat-nav-btn.active {
      background: var(--dark); border-color: var(--dark);
      color: var(--white);
    }

    /* ─── SECTIONS ─── */
    .section {
      padding: 4rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    .section:last-child { border-bottom: none; }

    .section-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
      margin-bottom: 3rem;
    }
    .section-header.reverse { direction: rtl; }
    .section-header.reverse > * { direction: ltr; }

    .section-img-wrap {
      position: relative; border-radius: 4px; overflow: hidden;
      aspect-ratio: 4/3;
    }
    .section-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s ease;
    }
    .section-img-wrap:hover .section-img { transform: scale(1.03); }

    .section-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem; font-weight: 700;
      color: var(--border); line-height: 1;
      margin-bottom: -1rem;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem; font-weight: 600;
      color: var(--dark); margin-bottom: 1rem;
      line-height: 1.2;
    }
    .section-desc {
      font-size: 0.95rem; line-height: 1.8;
      color: var(--muted);
    }
    .section-count {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }

    /* ─── PRODUCT GRID ─── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px; overflow: hidden;
      transition: box-shadow 0.3s, transform 0.3s;
      cursor: default;
    }
    .product-card:hover {
      box-shadow: 0 8px 32px rgba(26,22,18,0.1);
      transform: translateY(-4px);
    }
    .product-img-wrap {
      aspect-ratio: 1/1; overflow: hidden;
      background: var(--border);
    }
    .product-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s;
    }
    .product-card:hover .product-img { transform: scale(1.06); }
    .product-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      background: linear-gradient(135deg, #ede8df, #d8d0c0);
    }
    .product-info { padding: 1rem; text-align: center; }
    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 600;
      color: var(--dark); margin-bottom: 0.3rem;
      line-height: 1.3;
    }
    .product-price {
      font-size: 0.9rem; font-weight: 500;
      color: var(--accent);
    }
    .product-desc {
      font-size: 0.78rem; color: var(--muted);
      margin-top: 0.4rem; line-height: 1.5;
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--dark); color: rgba(255,255,255,0.4);
      text-align: center; padding: 2rem;
      font-size: 0.8rem; letter-spacing: 0.05em;
    }
    footer strong { color: rgba(255,255,255,0.7); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .section-header,
      .section-header.reverse { grid-template-columns: 1fr; direction: ltr; }
      .hero-content { padding: 2rem 1.5rem 2.5rem; }
      nav { padding: 0 1rem; }
      .section { padding: 3rem 1rem; }
      .cat-nav { padding: 1rem; }
    }
  </style>
</head>
<body>

<div id="loader"><span class="loader-text">Loading...</span></div>

<!-- NAVBAR -->
<nav>
  <a class="nav-logo" href="#"><span id="nav-title">Reforma</span></a>
  <div class="lang-wrapper" id="lang-wrapper">
    <button class="lang-selected" id="lang-selected" onclick="toggleLangDropdown()">
      <span id="lang-flag">🇬🇧</span>
      <span id="lang-label">English</span>
      <span class="arrow">▼</span>
    </button>
    <div class="lang-dropdown" id="lang-dropdown"></div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main id="main"></main>

<!-- FOOTER -->
<footer>
  <strong id="footer-brand">Reforma</strong> &mdash; <span id="footer-copy">© 2026 - All rights reserved</span>
</footer>

<script>
// ════════════════════════════════════════════════════════════════
//  КОНФИГУРАЦИЯ
// ════════════════════════════════════════════════════════════════
const CONFIG = {
  SHEET_ID: "1YK1wFH7qPgbCOTT76lEQLrxIpni6-3GnwT7AFalfJTQ",
  SHEETS: {
    settings: "Settings",
    products: "Products",
  },
  DEFAULT_LANG: "en",

  // Все языки: код → { label, flag }
  // Код языка должен совпадать с именем колонки в таблице (name_en, name_pl, и т.д.)
  LANGUAGES: {
    en: { label: "English",    flag: "🇬🇧" },
    pl: { label: "Polish",     flag: "🇵🇱" },
    uk: { label: "Ukrainian",  flag: "🇺🇦" },
    fr: { label: "French",     flag: "🇫🇷" },
    nl: { label: "Dutch",      flag: "🇳🇱" },
    de: { label: "German",     flag: "🇩🇪" },
    it: { label: "Italian",    flag: "🇮🇹" },
    es: { label: "Spanish",    flag: "🇪🇸" },
    pt: { label: "Portuguese", flag: "🇵🇹" },
    el: { label: "Greek",      flag: "🇬🇷" },
    cs: { label: "Czech",      flag: "🇨🇿" },
    sk: { label: "Slovak",     flag: "🇸🇰" },
    hu: { label: "Hungarian",  flag: "🇭🇺" },
    ro: { label: "Romanian",   flag: "🇷🇴" },
    bg: { label: "Bulgarian",  flag: "🇧🇬" },
    hr: { label: "Croatian",   flag: "🇭🇷" },
    sr: { label: "Serbian",    flag: "🇷🇸" },
    sl: { label: "Slovenian",  flag: "🇸🇮" },
    da: { label: "Danish",     flag: "🇩🇰" },
    no: { label: "Norwegian",  flag: "🇳🇴" },
    sv: { label: "Swedish",    flag: "🇸🇪" },
    fi: { label: "Finnish",    flag: "🇫🇮" },
    ru: { label: "Russian",    flag: "🇷🇺" },
  },
};
// ════════════════════════════════════════════════════════════════

// ─── STATE ───────────────────────────────────────────────────────
let currentLang = CONFIG.DEFAULT_LANG;
let catalog = { settings: {}, categories: [] };

// ─── HELPERS ─────────────────────────────────────────────────────
const setting = (key) => {
  if (!catalog.settings[key]) return "";
  return catalog.settings[key][currentLang] || catalog.settings[key]["en"] || "";
};
const apiUrl = (sheet) =>
  `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;

// ─── FETCH FUNCTIONS ──────────────────────────────────────────────
async function fetchSheetManualHeaders(sheetName) {
  const res = await fetch(apiUrl(sheetName));
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  const allRows = json.table.rows.map(row =>
    row.c.map(cell => cell ? cell.v : "")
  );
  const headers = allRows[0];
  return allRows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { if (h) obj[h] = row[i] || ""; });
    return obj;
  });
}

async function fetchSheet(sheetName) {
  const res = await fetch(apiUrl(sheetName));
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(row => {
    const obj = {};
    row.c.forEach((cell, i) => { obj[cols[i]] = cell ? cell.v : ""; });
    return obj;
  });
}

// ─── PARSE DATA ───────────────────────────────────────────────────
function parseData(settingsRows, productRows) {
  const settings = {};
  settingsRows.forEach(row => { if (row.key) settings[row.key] = row; });

  const catMap = new Map();
  productRows.forEach(row => {
    const cid = row.category_id;
    if (!cid) return;
    if (!catMap.has(cid)) {
      // Собираем названия категории для всех языков динамически
      const name = {}, desc = {};
      Object.keys(CONFIG.LANGUAGES).forEach(lang => {
        name[lang] = row[`category_name_${lang}`] || "";
        desc[lang] = row[`category_desc_${lang}`] || "";
      });
      catMap.set(cid, {
        id: cid,
        name,
        image: row.category_image || "",
        desc,
        products: []
      });
    }
    // Собираем названия товара для всех языков динамически
    const pName = {}, pDesc = {};
    Object.keys(CONFIG.LANGUAGES).forEach(lang => {
      pName[lang] = row[`name_${lang}`] || "";
      pDesc[lang] = row[`desc_${lang}`] || "";
    });
    catMap.get(cid).products.push({
      name: pName,
      price: row.price || "",
      image: row.image || "",
      desc: pDesc,
    });
  });

  return { settings, categories: [...catMap.values()] };
}

// ─── LANGUAGE DROPDOWN ────────────────────────────────────────────
function buildLangDropdown() {
  const dropdown = document.getElementById("lang-dropdown");
  dropdown.innerHTML = Object.entries(CONFIG.LANGUAGES).map(([code, info]) =>
    `<div class="lang-option${code === currentLang ? " active" : ""}" onclick="switchLang('${code}')">
      <span class="flag">${info.flag}</span>
      <span>${info.label}</span>
      <span class="code">${code.toUpperCase()}</span>
    </div>`
  ).join("");
}

function toggleLangDropdown() {
  document.getElementById("lang-wrapper").classList.toggle("open");
}

// Закрыть dropdown при клике вне
document.addEventListener("click", (e) => {
  const wrapper = document.getElementById("lang-wrapper");
  if (wrapper && !wrapper.contains(e.target)) {
    wrapper.classList.remove("open");
  }
});

function updateLangButton() {
  const info = CONFIG.LANGUAGES[currentLang];
  document.getElementById("lang-flag").textContent = info.flag;
  document.getElementById("lang-label").textContent = info.label;
}

// ─── RENDER ───────────────────────────────────────────────────────
function getLangVal(obj, key) {
  return obj[key + "_" + currentLang] || obj[key + "_en"] || "";
}

function render() {
  const siteName = setting("site_name") || "Reforma";
  document.title = siteName;
  document.getElementById("nav-title").textContent = siteName;
  document.getElementById("footer-brand").textContent = siteName;

  updateLangButton();
  buildLangDropdown();

  const bannerTitle = setting("banner_1_title");
  const bannerDesc  = setting("banner_1_desc");
  const bannerImg   = setting("banner_1_image");
  const bannerTag   = setting("banner_1_tag");

  const catNavHtml = catalog.categories.map(cat =>
    `<button class="cat-nav-btn" onclick="document.getElementById('cat-${cat.id}').scrollIntoView({behavior:'smooth'})">
      ${cat.name[currentLang] || cat.name.en || ""}
    </button>`
  ).join("");

  const sectionsHtml = catalog.categories.map((cat, idx) => {
    const isReverse = idx % 2 === 1;
    const catName = cat.name[currentLang] || cat.name.en || "";
    const catDesc = cat.desc[currentLang] || cat.desc.en || "";

    const headerHtml = `
      <div class="section-header${isReverse ? " reverse" : ""}">
        <div class="section-img-wrap">
          ${cat.image
            ? `<img class="section-img" src="${cat.image}" alt="${catName}" loading="lazy" />`
            : `<div class="product-img-placeholder">📦</div>`}
        </div>
        <div class="section-text">
          <div class="section-number">0${idx + 1}</div>
          <h2 class="section-title">${catName}</h2>
          ${catDesc ? `<p class="section-desc">${catDesc}</p>` : ""}
          <span class="section-count">${cat.products.length} ${productWord(cat.products.length)}</span>
        </div>
      </div>`;

    const productsHtml = cat.products.map(p => {
      const name = p.name[currentLang] || p.name.en || "";
      const desc = p.desc[currentLang] || p.desc.en || "";
      return `<div class="product-card">
        <div class="product-img-wrap">
          ${p.image
            ? `<img class="product-img" src="${p.image}" alt="${name}" loading="lazy" />`
            : `<div class="product-img-placeholder">🛍️</div>`}
        </div>
        <div class="product-info">
          <div class="product-name">${name}</div>
          ${desc ? `<div class="product-desc">${desc}</div>` : ""}
          ${p.price ? `<div class="product-price">${p.price}</div>` : ""}
        </div>
      </div>`;
    }).join("");

    return `<section class="section" id="cat-${cat.id}">
      ${headerHtml}
      <div class="product-grid">${productsHtml}</div>
    </section>`;
  }).join("");

  document.getElementById("main").innerHTML = `
    <section class="hero">
      ${bannerImg ? `<img class="hero-img" src="${bannerImg}" alt="banner" />` : ""}
      <div class="hero-overlay"></div>
      <div class="hero-content">
        ${bannerTag ? `<span class="hero-tag">${bannerTag}</span>` : ""}
        <h1 class="hero-title">${bannerTitle}</h1>
        ${bannerDesc ? `<p class="hero-desc">${bannerDesc}</p>` : ""}
      </div>
    </section>
    <div class="cat-nav">${catNavHtml}</div>
    ${sectionsHtml}
  `;
}

// ─── PRODUCT WORD ─────────────────────────────────────────────────
function productWord(n) {
  const words = {
    en: ["item","items"],
    pl: ["produkt","produkty","produktów"],
    uk: ["товар","товари","товарів"],
    fr: ["article","articles"],
    nl: ["artikel","artikelen"],
    de: ["Artikel","Artikel"],
    it: ["articolo","articoli"],
    es: ["artículo","artículos"],
    pt: ["artigo","artigos"],
    el: ["είδος","είδη"],
    cs: ["položka","položky","položek"],
    sk: ["položka","položky","položiek"],
    hu: ["termék","termék"],
    ro: ["produs","produse"],
    bg: ["артикул","артикула","артикула"],
    hr: ["artikl","artikla","artikala"],
    sr: ["artikal","artikla","artikala"],
    sl: ["artikel","artikli"],
    da: ["vare","varer"],
    no: ["vare","varer"],
    sv: ["artikel","artiklar"],
    fi: ["tuote","tuotetta"],
    ru: ["товар","товара","товаров"],
  };
  const w = words[currentLang] || words.en;
  // Slavic plural rules (ru, uk, pl, cs, sk, bg, hr, sr)
  if (["ru","uk","bg"].includes(currentLang) && w.length === 3) {
    const m10 = n % 10, m100 = n % 100;
    if (m100 >= 11 && m100 <= 14) return w[2];
    if (m10 === 1) return w[0];
    if (m10 >= 2 && m10 <= 4) return w[1];
    return w[2];
  }
  if (["pl","cs","sk","hr","sr"].includes(currentLang) && w.length === 3) {
    if (n === 1) return w[0];
    if (n >= 2 && n <= 4) return w[1];
    return w[2];
  }
  return n === 1 ? w[0] : w[1] || w[0];
}

// ─── SWITCH LANG ──────────────────────────────────────────────────
function switchLang(lang) {
  currentLang = lang;
  document.getElementById("lang-wrapper").classList.remove("open");
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────
async function init() {
  const isDemo = CONFIG.SHEET_ID === "ВСТАВЬТЕ_ID_ТАБЛИЦЫ_СЮДА" || !CONFIG.SHEET_ID;

  if (isDemo) {
    // demo fallback
    catalog = { settings: {}, categories: [] };
  } else {
    try {
      const [settingsRows, productRows] = await Promise.all([
        fetchSheetManualHeaders(CONFIG.SHEETS.settings),
        fetchSheet(CONFIG.SHEETS.products),
      ]);
      catalog = parseData(settingsRows, productRows);
    } catch (e) {
      console.warn("Ошибка загрузки Google Sheets:", e);
      catalog = { settings: {}, categories: [] };
    }
  }

  render();
  const loader = document.getElementById("loader");
  loader.classList.add("hidden");
  setTimeout(() => loader.remove(), 600);
}

init();
</script>
</body>
</html>
